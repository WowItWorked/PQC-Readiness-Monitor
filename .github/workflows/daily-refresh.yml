name: Daily refresh

# Refreshes the published dashboard once a day, in the U.S. Eastern morning.
#
# GitHub's scheduled runs are best-effort: jobs scheduled at the top of the hour
# (minute :00) are frequently delayed 1-3 hours or dropped entirely under load.
# To make a daily refresh reliable we (a) use off-peak minutes and (b) schedule
# two attempts; the job is idempotent (it only commits when the date actually
# changes), so the second run is a harmless no-op if the first already updated.
#
# Times are UTC and do NOT observe daylight saving. 10:19 UTC is ~6:19 AM EDT
# (summer) / 5:19 AM EST (winter); 14:19 UTC is the mid-morning safety net.
# Change the minutes/hours below to retune the window or timezone.
#
# What each run does:
#   1. Advances the "Data as of" date shown on the page to the current date.
#   2. Commits and pushes the change (so the published site is regenerated).
#   3. Explicitly requests a GitHub Pages build so the live site updates even
#      when the push is made by the Actions bot.
# The intelligence feeds themselves are fetched live in the browser on every
# visit from official government and allowlisted sources, so visitors always
# see current material; this job keeps the published snapshot date honest and
# guarantees a daily rebuild.

on:
  schedule:
    - cron: "19 10 * * *"  # ~06:19 ET — primary daily run (off the top of the hour)
    - cron: "19 14 * * *"  # ~10:19 ET — safety net if the morning run is dropped
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Scan institution websites for hybrid post-quantum TLS
        continue-on-error: true  # never let a flaky scan block the daily refresh
        run: |
          node scripts/gen-domains.mjs "$GITHUB_WORKSPACE/domains.json"
          ( cd scanner && go run . "$GITHUB_WORKSPACE/domains.json" "$GITHUB_WORKSPACE/results.json" )
          node scripts/build-tls-scan.mjs "$GITHUB_WORKSPACE/results.json"
          rm -f "$GITHUB_WORKSPACE/domains.json" "$GITHUB_WORKSPACE/results.json"

      - name: Record daily snapshot and update date
        run: |
          # Append today's (scan-adjusted) readiness scores to the history (idempotent).
          node scripts/snapshot.mjs
          # Advance the "Data as of" date shown on the page.
          TODAY="$(date -u +'%B %-d, %Y')"
          echo "Setting snapshot date to: $TODAY"
          sed -i "s/asOf: \"[^\"]*\"/asOf: \"$TODAY\"/" js/data/news.js
          if git diff --quiet; then
            echo "Nothing changed — no commit needed."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Daily snapshot: $TODAY"
            git push
          fi

      - name: Request a GitHub Pages build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds" \
            -o /dev/null -w "Pages build requested: HTTP %{http_code}\n"
